version: 0.1
component: build
timeoutInSeconds: 600

shell: bash

env:
  variables:
    NODE_ENV: production

steps:
  - type: Command
    name: Install Dependencies
    command: |
      echo "Installing dependencies..."
      npm install

  - type: Command
    name: Build React App
    command: |
      echo "Building React app..."
      npm run build

  - type: Command
    name: Post Build
    command: |
      echo "Build completed successfully"
